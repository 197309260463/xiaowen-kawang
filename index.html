<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应咉粉丝购买平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.8;
        }
        .notice {
            background: #ff6b3522;
            color: #ffcc00;
            padding: 10px 20px;
            font-size: 0.95rem;
        }
        .tabs {
            display: flex;
            background: #1e1e1e;
        }
        .tab-item {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-item.active {
            color: #ff6b35;
            border-bottom: 3px solid #ff6b35;
        }
        .tab-content {
            display: none;
            padding: 20px;
        }
        .tab-content.show {
            display: block;
        }
        .goods-card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .goods-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .goods-desc {
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .goods-price {
            font-size: 2rem;
            color: #ff3333;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .buy-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .buy-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>应咉粉丝购买平台</h1>
        <p>24小时自助购卡 | 自动发卡 | 粉丝专属</p>
    </div>
    <div class="notice">
        收款方：洗头师傅应咉，有问题联系客服处理！
    </div>
    <div class="tabs">
        <div class="tab-item active" onclick="switchPage(0)">购卡中心</div>
        <div class="tab-item" onclick="switchPage(1)">密钥激活</div>
    </div>

    <div class="tab-content show" id="tab0">
        <div class="goods-card">
            <h3 class="goods-title">小文回关</h3>
            <p class="goods-desc">小文专属回关福利，粉丝专属特权，购卡立即生效</p>
            <div class="goods-price">¥19.9</div>
            <a href="tencent://message/?uin=2557068271&Site=&Menu=yes" class="buy-btn">立即购买</a>
        </div>
        <div class="goods-card">
            <h3 class="goods-title">哈哈公主回关</h3>
            <p class="goods-desc">购买后哈哈公主主动回关，永久有效，秒处理</p>
            <div class="goods-price">¥199.9</div>
            <a href="tencent://message/?uin=2557068271&Site=&Menu=yes" class="buy-btn">立即购买</a>
        </div>
        <div class="goods-card">
            <h3 class="goods-title">大王回关</h3>
            <p class="goods-desc">大王专属回关服务，购卡即安排，稳定靠谱</p>
            <div class="goods-price">¥399.9</div>
            <a href="tencent://message/?uin=2557068271&Site=&Menu=yes" class="buy-btn">立即购买</a>
        </div>
    </div>

    <div class="tab-content" id="tab1">
        <div class="goods-card">
            <h3 class="goods-title">密钥激活</h3>
            <p class="goods-desc">购买后请联系客服QQ获取激活码</p>
            <input type="text" placeholder="请输入激活码" style="width:100%;padding:12px;margin:15px 0;border-radius:8px;border:none;">
            <button class="buy-btn">立即激活</button>
        </div>
    </div>

    <script>
        function switchPage(idx){
            let tabs = document.querySelectorAll('.tab-item');
            let pages = document.querySelectorAll('.tab-content');
            tabs.forEach((e,i)=>{
                e.classList.toggle('active', i==idx);
            });
            pages.forEach((e,i)=>{
                e.classList.toggle('show', i==idx);
            });
        }
    </script>
</body>
</html>
