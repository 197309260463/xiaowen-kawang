<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应咉粉丝购买平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
        }
        .header {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.8;
        }
        .notice {
            background: #ff6b3522;
            color: #ffcc00;
            padding: 10px 20px;
            font-size: 0.95rem;
        }
        .tabs {
            display: flex;
            background: #1e1e1e;
        }
        .tab-item {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .tab-item.active {
            color: #ff6b35;
            border-bottom: 3px solid #ff6b35;
        }
        .tab-content {
            display: none;
            padding: 20px;
        }
        .tab-content.show {
            display: block;
        }
        .goods-card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .goods-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .goods-desc {
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .goods-price {
            font-size: 2rem;
            color: #ff3333;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .buy-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            cursor: pointer;
        }

        /* 收款码弹窗 */
        .pay-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            text-align: center;
            padding-top: 60px;
        }
        .pay-modal img {
            width: 300px;
            border-radius: 12px;
            border: 3px solid #fff;
        }
        .pay-tip {
            color: #ffcc00;
            margin: 15px 0;
            font-size: 16px;
        }
        .close-btn {
            padding: 12px 30px;
            background: #ff6b35;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>应咉粉丝购买平台</h1>
        <p>24小时自助购卡 | 粉丝专属</p>
    </div>
    <div class="notice">
        付款后联系客服QQ：2557068271 处理订单！
    </div>

    <div class="tabs">
        <div class="tab-item active" onclick="switchPage(0)">购卡中心</div>
        <div class="tab-item" onclick="switchPage(1)">密钥激活</div>
    </div>

    <div class="tab-content show" id="tab0">
        <div class="goods-card">
            <h3 class="goods-title">小文回关</h3>
            <p class="goods-desc">小文专属回关福利，粉丝特权，购卡立即生效</p>
            <div class="goods-price">¥9.9</div>
            <button class="buy-btn" onclick="showPay(1)">立即购买 9.9 元</button>
        </div>

        <div class="goods-card">
            <h3 class="goods-title">哈哈公主回关</h3>
            <p class="goods-desc">购买后哈哈公主主动回关，永久有效</p>
            <div class="goods-price">¥199.9</div>
            <button class="buy-btn" onclick="showPay(2)">立即购买 199.9 元</button>
        </div>

        <div class="goods-card">
            <h3 class="goods-title">大王回关</h3>
            <p class="goods-desc">大王专属回关服务，购卡即安排</p>
            <div class="goods-price">¥399.9</div>
            <button class="buy-btn" onclick="showPay(3)">立即购买 399.9 元</button>
        </div>
    </div>

    <div class="tab-content" id="tab1">
        <div class="goods-card">
            <h3 class="goods-title">密钥激活</h3>
            <p class="goods-desc">无需密钥，付款后直接联系QQ办理即可</p>
            <input type="text" placeholder="请输入激活码" style="width:100%;padding:12px;margin:15px 0;border-radius:8px;border:none;">
            <button class="buy-btn">立即激活</button>
        </div>
    </div>

    <!-- 收款码弹窗 -->
    <div class="pay-modal" id="payModal">
        <img id="payImg" src="">
        <div class="pay-tip" id="payTip"></div>
        <button class="close-btn" onclick="closePay()">关闭</button>
    </div>

    <script>
        function switchPage(idx) {
            let tabs = document.querySelectorAll('.tab-item');
            let pages = document.querySelectorAll('.tab-content');
            tabs.forEach((e, i) => e.classList.toggle('active', i == idx));
            pages.forEach((e, i) => e.classList.toggle('show', i == idx));
        }

        // 对应三个价格的收款码
        function showPay(type) {
            let img = document.getElementById('payImg');
            let tip = document.getElementById('payTip');
            let modal = document.getElementById('payModal');

            if (type == 1) {
                // 9.9 元
                img.src = "pay_9.9.png";
                tip.innerText = "请扫码支付 9.9 元";
            } else if (type == 2) {
                // 199.9 元
                img.src = "pay_199.9.png";
                tip.innerText = "请扫码支付 199.9 元";
            } else if (type == 3) {
                // 399.9 元
                img.src = "pay_399.9.png";
                tip.innerText = "请扫码支付 399.9 元";
            }

            modal.style.display = "block";
        }

        function closePay() {
            document.getElementById('payModal').style.display = "none";
        }
    </script>
</body>
</html>
